<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AI Prediction Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5 rounded-4">

        <h1 class="text-center mb-5">
            AI Prediction Result
        </h1>

        <div class="text-center">

            <img
                src="{{ url_for('static', filename='uploads/' + image) }}"
                width="300"
                class="rounded shadow"
            >

        </div>

        <div class="mt-5">

            <h3>
                Predicted Disease
            </h3>

            <p class="fs-3 text-primary">
                {{ disease }}
            </p>

            <h3>
                Confidence Score
            </h3>

            <p class="fs-4 text-success">
                {{ confidence }}
            </p>

            <h3>
                Symptoms
            </h3>

            <p>
                {{ symptoms }}
            </p>

            <h3>
                Basic Precautions
            </h3>

            <p>
                {{ precautions }}
            </p>

            <div class="alert alert-warning mt-4">

                This is an AI-assisted prediction
                and not a medical diagnosis.

            </div>

        </div>

    </div>
<div class="text-center mt-5">

    <a href="/dashboard" class="btn btn-primary btn-lg">

        Back To Home

    </a>

</div>
</div>

</body>
</html>
