<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediVision AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0d6efd;
            overflow:hidden;
        }

        .splash-container{
            text-align:center;
            color:white;
            animation:fadeIn 2s ease;
        }

        .splash-container h1{
            font-size:70px;
            font-weight:bold;
            margin-top:20px;
        }

        .splash-container p{
            font-size:22px;
            margin-top:10px;
        }

        .logo-circle{
            width:180px;
            height:180px;
            border-radius:50%;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            font-size:90px;
            color:#0d6efd;
            font-weight:bold;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

    <!-- AUTO REDIRECT -->
    <script>

        setTimeout(function(){

            window.location.href = "/login";

        }, 3000);

    </script>

</head>

<body>

<div class="splash-container">

    <div class="logo-circle">
        🩺
    </div>

    <h1>MediVision AI</h1>

    <p>
        AI-Powered Healthcare Analysis Platform
    </p>

</div>

</body>
</html>
