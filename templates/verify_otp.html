<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OTP Verification</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

    <div class="row vh-100">

        <!-- LEFT SIDE -->
        <div class="col-md-6 d-flex flex-column justify-content-center align-items-center bg-primary text-white p-5">

            <h1 class="display-3 fw-bold">
                MediVision AI
            </h1>

            <p class="lead mt-4 text-center">
                Secure OTP verification for account activation.
            </p>

        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6 d-flex justify-content-center align-items-center">

            <div class="card shadow-lg p-5 rounded-4" style="width:450px;">

                <h2 class="text-center mb-4 fw-bold">
                    Verify OTP
                </h2>

                <form method="POST">

                    <input
                        type="text"
                        name="otp"
                        class="form-control form-control-lg"
                        placeholder="Enter OTP"
                        required
                    >

                    <button class="btn btn-primary btn-lg w-100 mt-4">
                        Verify
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
