<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - MediVision AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container-fluid">

    <div class="row vh-100">

        <!-- LEFT SIDE -->
        <div class="col-md-6 d-flex flex-column justify-content-center align-items-center bg-primary text-white p-5">

            <h1 class="display-3 fw-bold">
                MediVision AI
            </h1>

            <p class="lead mt-4 text-center">
                AI-powered healthcare platform for
                skin and oral disease analysis.
            </p>

        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6 d-flex justify-content-center align-items-center bg-light">

            <div class="card shadow-lg p-5 rounded-4" style="width: 450px;">

                <h2 class="text-center mb-4 fw-bold">
                    Login
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <input
                            type="email"
                            name="email"
                            class="form-control form-control-lg"
                            placeholder="Enter Email"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <input
                            type="password"
                            name="password"
                            class="form-control form-control-lg"
                            placeholder="Enter Password"
                            required
                        >

                    </div>

                    <button class="btn btn-primary btn-lg w-100 mt-3">
                        Login
                    </button>

                </form>

                <div class="text-center mt-4">

                    <a href="/register">
                        Create New Account
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
